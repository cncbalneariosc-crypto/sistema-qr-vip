<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innova Dynamics - Generador VIP</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #2d2d2d; padding: 30px; border-radius: 15px; display: inline-block; margin-top: 20px; border: 2px solid #3d3d3d; }
        input { padding: 10px; border-radius: 5px; border: none; width: 200px; }
        button { padding: 10px 20px; background: #2ecc71; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .qr-img { background: white; padding: 10px; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🎟️ Generador de Pases VIP</h1>
    
    <div class="card">
        <form action="/generar" method="post">
            <input type="text" name="nombre" placeholder="Nombre del invitado" required>
            <button type="submit">Generar Ticket</button>
        </form>

        {% if qr_code %}
        <div style="margin-top: 30px;">
            <h3>¡Pase para {{ nombre }} listo!</h3>
            <img class="qr-img" src="data:image/png;base64,{{ qr_code }}" width="200">
            <p>Escanea para validar</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
