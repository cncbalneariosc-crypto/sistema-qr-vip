<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Entrada</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            /* El color cambia dinámicamente desde main.py */
            background-color: {{ color }}; 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .box { 
            padding: 30px; 
            margin: 20px; 
            border-radius: 15px; 
            background: rgba(0,0,0,0.25); 
            width: 85%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { font-size: 45px; margin: 0 0 10px 0; letter-spacing: 2px; text-transform: uppercase; }
        h2 { font-size: 22px; margin: 10px 0; font-weight: normal; }
        .nombre { font-size: 30px; font-weight: bold; background: rgba(255,255,255,0.2); display: inline-block; padding: 10px 20px; border-radius: 8px; margin-top: 15px; text-transform: uppercase;}
    </style>
</head>
<body>
    <div class="box">
        <h1>{{ status }}</h1>
        <h2>{{ msg }}</h2>
        <div class="nombre">{{ nombre }}</div>
    </div>
</body>
</html>
